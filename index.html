<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEIZAN pennant</title>

  <!-- SheetJS（Excel読み込み） -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 上部コントロール（チーム + 月） -->
  <div id="controls" style="padding:12px 16px; background:#fff; border-bottom:1px solid #d5dde6; display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
    <div>
      <label for="teamSelect" style="font-weight:700; color:#1a5276; margin-right:8px;">チーム</label>
      <select id="teamSelect" style="padding:6px 10px; border:1px solid #d5dde6; border-radius:8px;">
        <option value="1">1組</option>
        <option value="2">2組</option>
        <option value="3">3組</option>
      </select>
    </div>

    <div>
      <label for="ymSelect" style="font-weight:700; color:#1a5276; margin-right:8px;">表示月</label>
      <select id="ymSelect" style="padding:6px 10px; border:1px solid #d5dde6; border-radius:8px;"></select>
      <span id="ymHint" style="margin-left:10px; color:#7f8c8d; font-size:12px;"></span>
    </div>
  </div>

  <div id="app">Loading...</div>

  <script src="firebase-config.js"></script>
  <!-- app.js が import を使うなら module 必須 -->
  <script type="module" src="app.js"></script>
</body>
</html>
