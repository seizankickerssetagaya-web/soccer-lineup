<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LINEUP">
<meta name="theme-color" content="#1a5c28">
<title>⚽ LINEUP</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:#f4f5f0;color:#1a1c18;font-size:14px;min-height:100vh}
.pg{display:none!important}
#pg-select.on,#pg-pw.on{display:flex!important}
#pg-app.on{display:flex!important}

/* ===== SCREENS ===== */
.pg{display:none!important}#pg-select.on,#pg-pw.on{display:flex!important}#pg-app.on{display:flex!important}

/* ===== SELECT PAGE ===== */
#pg-select{min-height:100vh;background:linear-gradient(160deg,#0a2e13,#1a5c28 60%,#2d7a3a);display:flex;align-items:center;justify-content:center;padding:20px}
.sel-box{width:100%;max-width:380px}
.sel-logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;color:#fff;text-align:center;margin-bottom:2px}
.sel-sub{font-size:11px;color:rgba(255,255,255,0.4);text-align:center;letter-spacing:2px;margin-bottom:16px}
.sync-status{text-align:center;font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:6px}
.sdot{width:8px;height:8px;border-radius:50%;background:#666;transition:background 0.3s;flex-shrink:0}
.sdot.on{background:#27ae60}
.mode-row{display:flex;gap:6px;background:rgba(0,0,0,0.2);border-radius:10px;padding:4px;margin-bottom:18px}
.mode-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.mode-btn.on{background:#fff;color:#1a5c28}
.mode-btn:not(.on){background:none;color:rgba(255,255,255,0.5)}
.grp-title{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;padding-left:2px}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.tcard{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.13);border-radius:12px;padding:14px 12px;cursor:pointer;transition:all 0.13s}
.tcard:active,.tcard:hover{background:rgba(255,255,255,0.18)}
.tcard.em{border-color:rgba(245,166,35,0.5);background:rgba(245,166,35,0.08)}
.tcard-em{font-size:22px;display:block;margin-bottom:5px}
.tcard-n{font-size:13px;font-weight:700;color:#fff;display:block}
.tcard-s{font-size:10px;color:rgba(255,255,255,0.4)}
.admin-card{background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.25);border-radius:12px;padding:12px 14px;cursor:pointer;display:none;align-items:center;gap:10px;transition:all 0.13s;margin-top:4px}
.admin-card.show{display:flex}
.admin-card:active{background:rgba(255,215,0,0.18)}
.admin-n{font-size:13px;font-weight:700;color:#FFD700}
.admin-s{font-size:10px;color:rgba(255,215,0,0.4)}

/* ===== PASSWORD ===== */
#pg-pw{min-height:100vh;background:linear-gradient(160deg,#0a2e13,#1a5c28);display:flex;align-items:center;justify-content:center;padding:20px}
.pw-box{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);border-radius:16px;padding:28px;width:100%;max-width:320px}
.pw-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.pw-sub{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:20px}
.pw-err{font-size:12px;color:#ff8a80;margin-bottom:10px;min-height:18px}
.pw-inp{width:100%;padding:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:10px;font-size:16px;font-family:'Noto Sans JP',sans-serif;margin-bottom:12px}
.pw-inp:focus{outline:none;border-color:rgba(255,255,255,0.5)}
.pw-inp::placeholder{color:rgba(255,255,255,0.3)}
.pw-row{display:flex;gap:8px}
.pw-row button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;border:none}
.pw-ok{background:#fff;color:#1a5c28}
.pw-cancel{background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.6)}
.pw-setup-lnk{font-size:11px;color:rgba(255,255,255,0.28);text-align:center;margin-top:14px;cursor:pointer}

/* ===== APP PAGE ===== */
#pg-app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#1a5c28;color:#fff;padding:12px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.top-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
.top-team{font-size:11px;background:rgba(255,255,255,0.18);padding:2px 8px;border-radius:20px}
.top-team.edit{background:#F5A623}
.top-right{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.tbtn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.tbtn:active{background:rgba(255,255,255,0.3)}
.ym-sel{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:5px 8px;border-radius:8px;font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;max-width:120px}
.ym-sel option{color:#000;background:#fff}

/* ===== LAYOUT ===== */
.app-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}
.sidebar{width:150px;flex-shrink:0;background:#fff;border-right:1px solid #d4d7cc;overflow-y:auto;padding:8px}
.sb-title{font-size:10px;font-weight:700;color:#8a8d82;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.sb-add-btn{background:none;border:none;color:#8a8d82;cursor:pointer;font-size:16px;line-height:1;padding:0}
.sb-add-btn:hover{color:#185FA5}
.att-section{border-bottom:1px solid #d4d7cc;padding-bottom:8px;margin-bottom:8px}
.att-label{font-size:9px;font-weight:700;color:#8a8d82;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.att-item{display:flex;align-items:center;gap:5px;padding:3px;border-radius:6px;cursor:pointer;user-select:none}
.att-item:hover{background:#eef0ea}
.att-chk{width:16px;height:16px;border-radius:3px;border:1.5px solid #c2c5ba;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;color:#fff;transition:all 0.1s}
.att-chk.on{background:#27ae60;border-color:#27ae60}
.att-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.att-name.abs{color:#8a8d82}
.drag-label{font-size:9px;font-weight:700;color:#8a8d82;letter-spacing:0.5px;text-transform:uppercase;margin:6px 0 4px}
.pchip{display:flex;align-items:center;gap:5px;padding:5px;border-radius:8px;border:1px solid #d4d7cc;background:#fff;margin-bottom:3px;cursor:grab;user-select:none;transition:all 0.1s}
.pchip:hover{border-color:#185FA5;background:#e6f1fb}
.pchip.dragging{opacity:0.4;border-style:dashed}
.pchip.abs{opacity:0.35}
.chip-dot{width:8px;height:8px;border-radius:50%;background:#185FA5;flex-shrink:0}
.chip-dot.sr{background:#c0392b}
.chip-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.chip-pts{font-size:9px;color:#8a8d82}
.sb-add-player{width:100%;padding:5px;font-size:11px;border:1px dashed #c2c5ba;background:none;color:#8a8d82;border-radius:8px;cursor:pointer;margin-top:4px;font-family:'Noto Sans JP',sans-serif}
.sb-add-player:hover{border-color:#185FA5;color:#185FA5}
.sb-view-note{font-size:10px;color:#8a8d82;text-align:center;padding:10px 4px;line-height:1.5}

/* ===== CONTENT ===== */
.content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}

/* ===== MATCH BLOCK ===== */
.mblock{background:#fff;border-radius:10px;border:1px solid #d4d7cc;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.mhdr{background:#1a5c28;color:#fff;padding:8px 12px;display:flex;align-items:center;gap:8px}
.mhdr-name{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1.5px}
.mhdr-pts{font-size:11px;color:rgba(255,255,255,0.7);background:rgba(0,0,0,0.2);padding:2px 8px;border-radius:20px;margin-left:auto}

/* ===== QUARTERS ===== */
.qrow{display:flex;border-bottom:1px solid #d4d7cc}
.qcol{flex:1;padding:8px;border-right:1px solid #d4d7cc;display:flex;flex-direction:column;align-items:center;min-width:0}
.qcol:last-child{border-right:none}
.qhead{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:170px;margin-bottom:6px}
.qlbl{font-size:10px;font-weight:700;color:#8a8d82;letter-spacing:1px}
.qright{display:flex;align-items:center;gap:4px}
.fsel{background:#1a5c28;border:none;color:#fff;padding:3px 6px;border-radius:5px;font-size:10px;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.fsel option{color:#000;background:#fff}
.fsel:disabled{opacity:0.6;cursor:default}
.qtag{font-size:9px;color:#8a8d82;background:#eef0ea;padding:1px 5px;border-radius:8px}

/* ===== FIELD — 170×255px fixed ===== */
.field{position:relative;width:170px;height:255px;background:#2d7a3a;border-radius:6px;overflow:hidden;flex-shrink:0}
.field svg.fsvg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.field .fdots{position:absolute;top:0;left:0;width:100%;height:100%}
.pdot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:1px;z-index:2;cursor:default}
.pdot.clickable{cursor:pointer}
.pcirc{width:30px;height:30px;border-radius:50%;background:#fff;border:2px solid #185FA5;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#185FA5;text-align:center;line-height:1.2;overflow:hidden;transition:all 0.1s}
.pcirc.filled{background:#185FA5;color:#fff;border-color:#185FA5}
.pcirc.sr{background:#c0392b;color:#fff;border-color:#c0392b}
.pcirc.changed{background:#c0392b;color:#fff;border-color:#c0392b}
.pcirc.dz{outline:3px solid #FFD700;transform:scale(1.1)}
.plbl{font-size:7px;color:#fff;background:rgba(0,0,0,0.45);padding:0 3px;border-radius:2px;white-space:nowrap}

/* ===== BENCH ===== */
.bench-area{padding:7px 10px;background:#eef0ea;border-top:1px solid #d4d7cc}
.bench-title{font-size:9px;font-weight:700;color:#8a8d82;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.bench-pills{display:flex;flex-wrap:wrap;gap:4px;min-height:20px;border-radius:4px;padding:2px 0;transition:background 0.1s}
.bench-pills.dz{background:rgba(24,95,165,0.1);outline:1px dashed #185FA5}
.bpill{display:flex;align-items:center;gap:3px;padding:3px 8px;background:#fff;border:1px solid #d4d7cc;border-radius:20px;font-size:11px}
.bpill-rm{font-size:9px;color:#8a8d82;margin-left:2px;cursor:pointer}
.bpill-rm:hover{color:#c0392b}
.bench-add{font-size:10px;color:#8a8d82;padding:3px 8px;border:1px dashed #c2c5ba;border-radius:20px;cursor:pointer;display:inline-block;margin-top:3px;font-family:'Noto Sans JP',sans-serif}
.bench-add:hover{border-color:#185FA5;color:#185FA5}

/* ===== STATS ===== */
.stats-panel{background:#fff;border-radius:10px;border:1px solid #d4d7cc;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.stats-title{font-size:13px;font-weight:700;margin-bottom:10px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:5px}
.srow{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#eef0ea;border-radius:8px}
.s-dot{width:8px;height:8px;border-radius:50%;background:#185FA5;flex-shrink:0}
.s-dot.sr{background:#c0392b}
.s-info{flex:1;min-width:0}
.s-name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-detail{font-size:9px;color:#8a8d82;margin-top:1px}
.s-pts{font-size:12px;font-weight:700;color:#185FA5;white-space:nowrap}
.s-pts.max{color:#0F6E56}
.sbar{height:3px;background:#d4d7cc;border-radius:2px;margin-top:3px}
.sbar-fill{height:100%;border-radius:2px;transition:width 0.3s}

/* ===== MODALS ===== */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:500;align-items:flex-end;justify-content:center}
.modal-wrap.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 18px 30px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.mhandle{width:36px;height:4px;background:#d4d7cc;border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.form-row{margin-bottom:10px}
.form-row label{font-size:11px;color:#8a8d82;display:block;margin-bottom:3px}
.form-row input,.form-row select{width:100%;padding:11px;border:1px solid #d4d7cc;border-radius:10px;font-size:15px;font-family:'Noto Sans JP',sans-serif;background:#fff;color:#1a1c18}
.form-row input:focus,.form-row select:focus{outline:none;border-color:#185FA5}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mbtn-p{background:#185FA5;color:#fff;border:none;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.mbtn-p:active{background:#0e4a80}
.mbtn-s{background:none;border:1px solid #c2c5ba;color:#4a4d44;padding:11px 13px;border-radius:10px;font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.mbtn-d{background:none;border:1px solid #c0392b;color:#c0392b;padding:11px 13px;border-radius:10px;font-size:14px;cursor:pointer;margin-right:auto;font-family:'Noto Sans JP',sans-serif}
.share-ta{width:100%;height:180px;font-family:monospace;font-size:11px;padding:10px;border:1px solid #d4d7cc;border-radius:10px;resize:none;background:#eef0ea;color:#1a1c18;line-height:1.6}

/* ===== RESET SHEET ===== */
.sheet-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:600}
.sheet-wrap.open{display:block}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:500px;background:#fff;border-radius:16px 16px 0 0;padding:16px;z-index:601;transition:transform 0.22s ease}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sheet-title{font-size:13px;font-weight:700;text-align:center;color:#4a4d44;margin-bottom:12px}
.sht-btn{width:100%;padding:13px 14px;border-radius:10px;font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;font-weight:500;border:none;margin-bottom:8px;text-align:left;display:block}
.sht-btn small{font-size:10px;font-weight:400;display:block;margin-top:1px;opacity:0.65}
.sht-p{background:#e6f1fb;color:#185FA5}
.sht-f{background:#fdf0ef;color:#c0392b}
.sht-c{background:#eef0ea;color:#8a8d82}
</style>
</head>
<body>

<!-- ===== SELECT PAGE ===== -->
<div id="pg-select" class="pg on">
  <div class="sel-box">
    <div class="sel-logo">⚽ LINEUP</div>
    <div class="sel-sub">SOCCER MEMBER MANAGER</div>
    <div class="sync-status">
      <span class="sdot" id="sdot"></span>
      <span id="slabel">Firebase接続中...</span>
    </div>
    <div class="mode-row">
      <button class="mode-btn on" id="modeV" onclick="setSelMode('view')">👁 閲覧（誰でも）</button>
      <button class="mode-btn" id="modeE" onclick="setSelMode('edit')">✏️ 編集（監督）</button>
    </div>

    <p class="grp-title">🦈 1組 Sharks</p>
    <div class="team-grid">
      <div class="tcard" id="tc-sharks-senior" onclick="onPickTeam('sharks','senior')">
        <span class="tcard-em">🦈</span><span class="tcard-n">Sharks</span><span class="tcard-s">シニア</span>
      </div>
      <div class="tcard" id="tc-sharks-pennant" onclick="onPickTeam('sharks','pennant')">
        <span class="tcard-em">🦈</span><span class="tcard-n">Sharks</span><span class="tcard-s">ペナント</span>
      </div>
    </div>
    <p class="grp-title">🐂 2組 Bulls</p>
    <div class="team-grid">
      <div class="tcard" id="tc-bulls-senior" onclick="onPickTeam('bulls','senior')">
        <span class="tcard-em">🐂</span><span class="tcard-n">Bulls</span><span class="tcard-s">シニア</span>
      </div>
      <div class="tcard" id="tc-bulls-pennant" onclick="onPickTeam('bulls','pennant')">
        <span class="tcard-em">🐂</span><span class="tcard-n">Bulls</span><span class="tcard-s">ペナント</span>
      </div>
    </div>
    <p class="grp-title">🦅 3組 Hawks</p>
    <div class="team-grid">
      <div class="tcard" id="tc-hawks-senior" onclick="onPickTeam('hawks','senior')">
        <span class="tcard-em">🦅</span><span class="tcard-n">Hawks</span><span class="tcard-s">シニア</span>
      </div>
      <div class="tcard" id="tc-hawks-pennant" onclick="onPickTeam('hawks','pennant')">
        <span class="tcard-em">🦅</span><span class="tcard-n">Hawks</span><span class="tcard-s">ペナント</span>
      </div>
    </div>
    <div class="admin-card" id="adminCard" onclick="onPickTeam('admin','all')">
      <span style="font-size:20px">👑</span>
      <div><div class="admin-n">管理者（全チーム）</div><div class="admin-s">全チームを切り替えて編集</div></div>
    </div>
  </div>
</div>

<!-- ===== PASSWORD PAGE ===== -->
<div id="pg-pw" class="pg">
  <div class="pw-box">
    <div class="pw-title" id="pw-title">編集パスワード</div>
    <div class="pw-sub" id="pw-sub">パスワードを入力してください</div>
    <div class="pw-err" id="pw-err"></div>
    <input type="password" class="pw-inp" id="pw-inp" placeholder="パスワード" autocomplete="current-password">
    <div class="pw-row">
      <button class="pw-cancel" onclick="showPage('pg-select')">キャンセル</button>
      <button class="pw-ok" onclick="onSubmitPw()">ログイン</button>
    </div>
    <div class="pw-setup-lnk" onclick="openPwSetup()">⚙️ パスワードを設定・変更する</div>
  </div>
</div>

<!-- ===== APP PAGE ===== -->
<div id="pg-app" class="pg">
  <div class="topbar">
    <div class="top-logo">⚽</div>
    <span class="top-team" id="topTeam">LINEUP</span>
    <div class="top-right">
      <input type="text" id="venue" placeholder="会場" style="background:rgba(255,255,255,0.11);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:5px 7px;border-radius:8px;font-size:11px;font-family:'Noto Sans JP',sans-serif;width:70px;display:none">
      <select class="ym-sel" id="ymSel" onchange="onYmChange(this.value)"></select>
      <button class="tbtn" id="btnNewMonth" style="display:none" onclick="onNewMonth()">＋月</button>
      <button class="tbtn" id="btnAdminSw" style="display:none" onclick="openAdminSw()">⇄チーム</button>
      <button class="tbtn" onclick="openShare()">📋共有</button>
      <button class="tbtn" id="btnReset" style="display:none" onclick="openSheet()">↺リセット</button>
      <button class="tbtn" onclick="onGoBack()">←戻る</button>
    </div>
  </div>

  <div class="app-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ===== MODALS ===== -->
<!-- Player Modal -->
<div class="modal-wrap" id="playerModal">
  <div class="modal">
    <div class="mhandle"></div>
    <h3 id="pm-title">選手を登録</h3>
    <div class="form-row"><label>選手名</label><input type="text" id="pm-name" placeholder="例：田中 太郎" autocomplete="off"></div>
    <div class="form-row"><label>グループ</label>
      <select id="pm-group">
        <option value="senior">シニア（シニア戦のみ）</option>
        <option value="pennant">ペナント（現役戦・OB戦・混合戦）</option>

// ================================================================
// DATA PATHS
// ================================================================
function rosterPath() { return 'teams/' + CUR.id + '/roster'; }
function monthPath()  { return 'teams/' + CUR.id + '/months/' + curYM; }
function histPath()   { return 'teams/' + CUR.id + '/ymhist'; }

function lsGet(k)   { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } }
function lsSet(k,v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
function lsKey(s)   { return 'slm8:' + CUR.id + ':' + s; }

function emptyRoster() { return {players:{}, attendance:{}, nextId:1}; }
function emptyMonth()  {
  var d = {lineups:{}, formations:{}, venue:''};
  var g = CUR.group;
  MATCHES[g].forEach(function(m) {
    d.formations[m+'_1Q'] = DEF_FM;
    d.formations[m+'_2Q'] = DEF_FM;
  });
  return d;
}

// ================================================================
// LOAD DATA
// ================================================================
function loadData(cb) {
  // Start with empty
  D.roster = emptyRoster();
  D.month  = emptyMonth();

  // Load from localStorage first (instant)
  var lr = lsGet(lsKey('roster'));
  if (lr) D.roster = lr;
  var lm = lsGet(lsKey('month:' + curYM));
  if (lm) D.month = lm;

  if (cb) cb();

  // Then attach Firebase listener if available
  if (fbDB) {
    if (fbListener) { fbListener(); fbListener = null; }
    var rRef = fbDB.ref(rosterPath());
    var mRef = fbDB.ref(monthPath());

    var rHandler = function(snap) {
      if (snap.val()) { D.roster = snap.val(); lsSet(lsKey('roster'), D.roster); render(); }
    };
    var mHandler = function(snap) {
      if (snap.val()) { D.month = snap.val(); lsSet(lsKey('month:' + curYM), D.month); render(); }
    };
    rRef.on('value', rHandler);
    mRef.on('value', mHandler);
    fbListener = function() { rRef.off('value', rHandler); mRef.off('value', mHandler); };
  }
}

function saveRoster() {
  lsSet(lsKey('roster'), D.roster);
  if (fbDB) fbDB.ref(rosterPath()).set(D.roster);
}

function saveMonth() {
  lsSet(lsKey('month:' + curYM), D.month);
  if (fbDB) fbDB.ref(monthPath()).set(D.month);
  // Update history
  var hist = lsGet(lsKey('ymhist')) || [];
  if (hist.indexOf(curYM) < 0) { hist.unshift(curYM); hist.sort().reverse(); lsSet(lsKey('ymhist'), hist); }
  if (fbDB) fbDB.ref(histPath()).set(hist);
}

// ================================================================
// YEAR-MONTH
// ================================================================
function todayYM() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function buildYmSel() {
  var hist = lsGet(lsKey('ymhist')) || [];
  if (hist.indexOf(curYM) < 0) { hist.unshift(curYM); hist.sort().reverse(); }
  var sel = document.getElementById('ymSel');
  sel.innerHTML = '';
  hist.forEach(function(ym) {
    var parts = ym.split('-');
    var o = document.createElement('option');
    o.value = ym;
    o.textContent = parts[0] + '年' + parseInt(parts[1]) + '月';
    if (ym === curYM) o.selected = true;
    sel.appendChild(o);
  });
  // Also fetch from Firebase
  if (fbDB) {
    fbDB.ref(histPath()).once('value').then(function(snap) {
      if (snap.val()) {
        var h2 = snap.val();
        lsSet(lsKey('ymhist'), h2);
        sel.innerHTML = '';
        h2.forEach(function(ym) {
          var parts = ym.split('-');
          var o = document.createElement('option');
          o.value = ym;
          o.textContent = parts[0] + '年' + parseInt(parts[1]) + '月';
          if (ym === curYM) o.selected = true;
          sel.appendChild(o);
        });
      }
    });
  }
}

function onYmChange(ym) {
  curYM = ym;
  if (fbListener) { fbListener(); fbListener = null; }
  loadData(function() { render(); });
}

function onNewMonth() {
  curYM = todayYM();
  D.month = emptyMonth();

function onPickTeam(team, group) {
  var id = (team === 'admin') ? 'admin' : team + '-' + group;
  if (selMode === 'view') {
    var meta = TEAMS.find(function(t) { return t.id === id; }) || TEAMS[0];
    enterApp(meta, false, false);
  } else {
    pendingTeam = {id:id, team:team, group:group};
    var meta2 = TEAMS.find(function(t) { return t.id === id; });
    document.getElementById('pw-title').textContent = (meta2 ? meta2.label : '管理者') + ' — 編集パスワード';
    document.getElementById('pw-err').textContent = '';
    document.getElementById('pw-inp').value = '';
    showPage('pg-pw');
    setTimeout(function() { document.getElementById('pw-inp').focus(); }, 200);
  }
}

// ================================================================
// PASSWORD
// ================================================================
function hashPw(pw) { return btoa(unescape(encodeURIComponent('slm8_' + pw))); }
function getPws()   { return lsGet('slm8_pws') || {}; }
function setPws(o)  { lsSet('slm8_pws', o); }

function checkPw(tid, pw) {
  var s = getPws(), k = (tid === 'admin') ? 'admin' : tid;
  if (!s[k]) return 'unset';
  return (s[k] === hashPw(pw)) ? 'ok' : 'wrong';
}

function onSubmitPw() {
  var pw = document.getElementById('pw-inp').value;
  if (!pw) { document.getElementById('pw-err').textContent = 'パスワードを入力してください'; return; }
  if (!pendingTeam) return;
  var res = checkPw(pendingTeam.id, pw);
  if (res === 'unset') { document.getElementById('pw-err').textContent = '未設定です。先に設定してください'; return; }
  if (res === 'wrong') { document.getElementById('pw-err').textContent = 'パスワードが違います'; document.getElementById('pw-inp').value=''; return; }
  if (pendingTeam.id === 'admin') {
    enterApp(TEAMS[0], true, true);
  } else {
    var meta = TEAMS.find(function(t) { return t.id === pendingTeam.id; });
    enterApp(meta, true, false);
  }
  pendingTeam = null;
}

function onSavePwSetup() {
  var s = getPws(), n = 0;

// ---- SIDEBAR ----
function renderSidebar() {
  var g  = CUR.group;
  var sb = document.getElementById('sidebar');
  sb.innerHTML = '';

  var players = Object.entries(D.roster.players || {})
    .filter(function(e) { return e[1].group === g; })
    .sort(function(a,b) { return a[1].name.localeCompare(b[1].name,'ja'); });

  if (!isEdit) {
    var note = document.createElement('div'); note.className = 'sb-view-note';
    note.textContent = '👁 閲覧モード';
    sb.appendChild(note);
    players.forEach(function(e) {
      var r = document.createElement('div'); r.style.cssText = 'font-size:11px;padding:3px 3px;display:flex;align-items:center;gap:4px';
      var d = document.createElement('div'); d.className = 'chip-dot' + (g==='senior'?' sr':'');
      var n = document.createElement('span'); n.textContent = e[1].name; n.style.cssText='white-space:nowrap;overflow:hidden;text-overflow:ellipsis';
      r.append(d,n); sb.appendChild(r);
    });
    return;
  }

  // Title
  var hd = document.createElement('div'); hd.className = 'sb-title';
  var ht = document.createElement('span'); ht.textContent = g==='senior'?'シニア':'ペナント'; hd.appendChild(ht);
  var addBtn = document.createElement('button'); addBtn.className = 'sb-add-btn'; addBtn.textContent = '＋'; addBtn.onclick = function() { openPlayerModal(null); };
  hd.appendChild(addBtn); sb.appendChild(hd);

  // Attendance
  if (players.length) {
    var aSec = document.createElement('div'); aSec.className = 'att-section';
    var aLbl = document.createElement('div'); aLbl.className = 'att-label'; aLbl.textContent = '出欠確認'; aSec.appendChild(aLbl);
    var sorted = players.slice().sort(function(a,b) {
      var x = D.roster.attendance[a[0]]?1:0, y = D.roster.attendance[b[0]]?1:0;
      return x!==y ? y-x : a[1].name.localeCompare(b[1].name,'ja');
    });
    sorted.forEach(function(e) {
      var id = e[0], p = e[1], pres = !!D.roster.attendance[id];
      var row = document.createElement('div'); row.className = 'att-item';
      var chk = document.createElement('div'); chk.className = 'att-chk' + (pres?' on':''); chk.textContent = pres ? '✓' : '';
      var nm  = document.createElement('div'); nm.className  = 'att-name' + (pres?'':' abs'); nm.textContent = p.name;
      row.append(chk, nm);
      row.onclick = function() { D.roster.attendance[id] = !D.roster.attendance[id]; saveRoster(); renderSidebar(); };
      aSec.appendChild(row);
    });
    sb.appendChild(aSec);
  }

  // Drag chips
  var dl = document.createElement('div'); dl.className = 'drag-label'; dl.textContent = 'ドラッグして配置'; sb.appendChild(dl);
  var pres = players.filter(function(e) { return D.roster.attendance[e[0]]; });
  var abss = players.filter(function(e) { return !D.roster.attendance[e[0]]; });
  pres.concat(abss).forEach(function(e) {
    var id = e[0], p = e[1];
    var pts = calcPts(id);
    var chip = document.createElement('div');
    chip.className = 'pchip' + (D.roster.attendance[id] ? '' : ' abs');
    chip.draggable = true;
    var dot  = document.createElement('div'); dot.className = 'chip-dot'+(g==='senior'?' sr':'');
    var info = document.createElement('div'); info.style.cssText='flex:1;min-width:0';
    info.innerHTML = '<div class="chip-name">'+esc(p.name)+'</div><div class="chip-pts">'+pts.toFixed(1)+'pt</div>';
    chip.append(dot, info);
    chip.addEventListener('dragstart', function(e2) { dragId = id; e2.dataTransfer.effectAllowed='copy'; setTimeout(function(){chip.classList.add('dragging');},0); });
    chip.addEventListener('dragend', function() { chip.classList.remove('dragging'); });
    chip.addEventListener('dblclick', function() { openPlayerModal(id); });
    sb.appendChild(chip);
  });

  var ab2 = document.createElement('button'); ab2.className = 'sb-add-player'; ab2.textContent = '＋ 選手を追加'; ab2.onclick = function() { openPlayerModal(null); };
  sb.appendChild(ab2);
}

function renderContent() {
  var g = CUR.group;
  var c = document.getElementById('content');
  c.innerHTML = '';

  if (isEdit) {
    var sb = document.createElement('button');
    sb.style.cssText = 'font-size:11px;padding:4px 10px;border:1px solid #d4d7cc;background:#fff;border-radius:20px;cursor:pointer;color:#8a8d82;font-family:inherit;align-self:flex-start';
    sb.textContent = '📊 出場ポイント集計';
    sb.onclick = function() { c.innerHTML=''; renderStats(c); };
    c.appendChild(sb);
  }

  MATCHES[g].forEach(function(mName) {
    c.appendChild(buildMatch(mName, g));
  });
}

// ---- MATCH ----
function buildMatch(mName, group) {
  var wrap = document.createElement('div'); wrap.className = 'mblock';
  var hdr  = document.createElement('div'); hdr.className  = 'mhdr';
  var hn   = document.createElement('div'); hn.className   = 'mhdr-name'; hn.textContent = mName;
  var hp   = document.createElement('div'); hp.className   = 'mhdr-pts';
  var allP = Object.entries(D.roster.players||{}).filter(function(e){return e[1].group===group;});
  var tot  = allP.reduce(function(s,e){return s+calcMatchPts(e[0],mName);},0);
  hp.textContent = '計 '+tot.toFixed(1)+'pt';
  hdr.append(hn, hp); wrap.appendChild(hdr);

  var qrow = document.createElement('div'); qrow.className = 'qrow';
  qrow.appendChild(buildQ(mName,'1Q',group));
  qrow.appendChild(buildQ(mName,'2Q',group));
  wrap.appendChild(qrow);
  wrap.appendChild(buildBench(mName, group));
  return wrap;
}

// ---- QUARTER ----
function buildQ(mName, q, group) {
  var fmKey = mName+'_'+q;
  var fm    = (D.month.formations && D.month.formations[fmKey]) || DEF_FM;
  var col   = document.createElement('div'); col.className = 'qcol';

  var head  = document.createElement('div'); head.className = 'qhead';
  var qlbl  = document.createElement('span'); qlbl.className = 'qlbl'; qlbl.textContent = q;
  var qr    = document.createElement('div'); qr.className = 'qright';

  var fsel  = document.createElement('select'); fsel.className = 'fsel';
  FM_NAMES.forEach(function(name) {
    var o = document.createElement('option'); o.value = name; o.textContent = name;
    if (name === fm) o.selected = true;
    fsel.appendChild(o);
  });
  fsel.disabled = !isEdit;
  fsel.addEventListener('change', function() {
    if (!D.month.formations) D.month.formations = {};
    D.month.formations[fmKey] = fsel.value;
    // If 1Q changed, copy to 2Q unset positions
    if (q === '1Q') copy1to2(mName, group);
    if (isEdit) saveMonth();
    // Rebuild field
    var oldF = col.querySelector('.field');
    if (oldF) oldF.replaceWith(buildField(mName, q, fsel.value, group));
  });

  var qtag = document.createElement('span'); qtag.className = 'qtag'; qtag.textContent = '7:30';
  qr.append(fsel, qtag); head.append(qlbl, qr); col.appendChild(head);
  col.appendChild(buildField(mName, q, fm, group));
  return col;
}

// ---- FIELD ----
function buildField(mName, q, fm, group) {
  var lkey  = mName+'_'+q;
  var lu    = (D.month.lineups && D.month.lineups[lkey]) || {};
  var lu1   = (q==='2Q') ? ((D.month.lineups && D.month.lineups[mName+'_1Q']) || {}) : null;
  var fData = FM[fm] || FM[DEF_FM];
  var ns    = 'http://www.w3.org/2000/svg';

  var field = document.createElement('div'); field.className = 'field';

  // SVG field lines
  var svg = document.createElementNS(ns,'svg'); svg.classList.add('fsvg');
  svg.setAttribute('viewBox','0 0 170 255');
  svg.setAttribute('preserveAspectRatio','none');

  function mkR(x,y,w,h,s) {
    var e=document.createElementNS(ns,'rect');
    e.setAttribute('x',x);e.setAttribute('y',y);e.setAttribute('width',w);e.setAttribute('height',h);
    e.setAttribute('fill','none');e.setAttribute('stroke',s);e.setAttribute('stroke-width','1');
    return e;
  }
  function mkL(x1,y1,x2,y2,s) {
    var e=document.createElementNS(ns,'line');
    e.setAttribute('x1',x1);e.setAttribute('y1',y1);e.setAttribute('x2',x2);e.setAttribute('y2',y2);
    e.setAttribute('stroke',s);e.setAttribute('stroke-width','0.7');
    return e;
  }
  function mkC(cx,cy,r,s) {
    var e=document.createElementNS(ns,'circle');
    e.setAttribute('cx',cx);e.setAttribute('cy',cy);e.setAttribute('r',r);
    e.setAttribute('fill','none');e.setAttribute('stroke',s);e.setAttribute('stroke-width','0.7');
    return e;
  }
  var w5='rgba(255,255,255,0.55)',w3='rgba(255,255,255,0.3)';
  svg.append(
    mkR(3,3,164,249,w5),
    mkL(3,127,167,127,w3),
    mkC(85,127,19,w3),
    mkR(42,3,86,30,w3),
    mkR(58,3,54,15,w3),
    mkR(42,222,86,30,w3),
    mkR(58,237,54,15,w3)
  );
  field.appendChild(svg);

  // Dots layer
  var dotsEl = document.createElement('div'); dotsEl.className = 'fdots';
  fData.forEach(function(pos) {
    var pid    = lu[pos.k];
    var player = pid ? (D.roster.players||{})[pid] : null;
    var isSr   = player && player.group==='senior';
    var changed= lu1 && lu1[pos.k]!==lu[pos.k] && lu[pos.k]!=null;

    var dot = document.createElement('div');
    dot.className = 'pdot' + (isEdit ? ' clickable' : '');
    dot.style.left = pos.x+'%';
    dot.style.top  = pos.y+'%';

    var circ = document.createElement('div');
    if (!player) {
      circ.className = 'pcirc';
      circ.textContent = pos.p;
    } else if (changed) {
      circ.className = 'pcirc changed';
    } else if (isSr) {
      circ.className = 'pcirc sr';
    } else {
      circ.className = 'pcirc filled';
    }

    if (player) {
      var sp = document.createElement('span');
      sp.style.cssText = 'font-size:7px;line-height:1.2;word-break:break-all;text-align:center;display:block;max-width:28px;padding:0 1px';
      sp.textContent = shn(player.name);
      circ.appendChild(sp);
    }

    var lbl = document.createElement('div'); lbl.className = 'plbl'; lbl.textContent = pos.p;
    dot.append(circ, lbl);

    if (isEdit) {
      dot.addEventListener('click', function() { openPosModal(mName, q, pos.k, pos.p, group); });
      dot.addEventListener('dragover', function(e2) { e2.preventDefault(); circ.classList.add('dz'); });
      dot.addEventListener('dragleave', function() { circ.classList.remove('dz'); });
      dot.addEventListener('drop', function(e2) {
        e2.preventDefault(); circ.classList.remove('dz');
        if (!dragId) return;
        if (!D.month.lineups) D.month.lineups = {};
        if (!D.month.lineups[lkey]) D.month.lineups[lkey] = {};
        D.month.lineups[lkey][pos.k] = dragId;
        if (q==='1Q') copy1to2(mName, group);
        saveMonth(); render();
      });
    }
    dotsEl.appendChild(dot);
  });
  field.appendChild(dotsEl);
  return field;
}

function copy1to2(mName, group) {
  var lu1 = (D.month.lineups||{})[mName+'_1Q']||{};
  var lkey2 = mName+'_2Q';
  if (!D.month.lineups) D.month.lineups={};
  if (!D.month.lineups[lkey2]) D.month.lineups[lkey2]={};
  var lu2 = D.month.lineups[lkey2];
  Object.keys(lu1).forEach(function(k) {
    if (!lu2[k]) lu2[k] = lu1[k];
  });
}

// ---- BENCH ----
function buildBench(mName, group) {
  var bkey  = mName+'_bench';
  var bench = (D.month.lineups && D.month.lineups[bkey]) || [];
  var block = document.createElement('div'); block.className='bench-area';
  var lbl   = document.createElement('div'); lbl.className='bench-title'; lbl.textContent='控え（1Q・2Q共通）'; block.appendChild(lbl);
  var pills = document.createElement('div'); pills.className='bench-pills';

  bench.forEach(function(pid, idx) {
    var p = (D.roster.players||{})[pid]; if(!p) return;
    var pill = document.createElement('div'); pill.className='bpill';
    var nm   = document.createElement('span'); nm.textContent=p.name; pill.appendChild(nm);
    if (isEdit) {
      var rm = document.createElement('span'); rm.className='bpill-rm'; rm.textContent='✕';
      rm.onclick = function() { D.month.lineups[bkey].splice(idx,1); saveMonth(); render(); };
      pill.appendChild(rm);
    }
    pills.appendChild(pill);
  });

  if (isEdit) {
    pills.addEventListener('dragover',function(e){e.preventDefault();pills.classList.add('dz');});
    pills.addEventListener('dragleave',function(){pills.classList.remove('dz');});
    pills.addEventListener('drop',function(e){
      e.preventDefault();pills.classList.remove('dz');
      if(!dragId)return;
      if(!D.month.lineups)D.month.lineups={};
      if(!D.month.lineups[bkey])D.month.lineups[bkey]=[];
      if(D.month.lineups[bkey].indexOf(dragId)<0){D.month.lineups[bkey].push(dragId);saveMonth();render();}
    });
    block.appendChild(pills);
    var ab=document.createElement('div');ab.className='bench-add';ab.textContent='＋ 控えに追加';
    ab.onclick=function(){openBenchModal(mName,group);};
    block.appendChild(ab);
  } else {
    block.appendChild(pills);
  }
  return block;
}

// ---- STATS ----
function calcMatchPts(pid, mName) {
  var pts = 0;
  var lu1 = (D.month.lineups||{})[mName+'_1Q']||{};
  var lu2 = (D.month.lineups||{})[mName+'_2Q']||{};
  var bn  = (D.month.lineups||{})[mName+'_bench']||[];
  if (Object.values(lu1).indexOf(pid)>=0 || bn.indexOf(pid)>=0) pts += Q_PTS;
  if (Object.values(lu2).indexOf(pid)>=0 || bn.indexOf(pid)>=0) pts += Q_PTS;
  return pts;
}
function calcPts(pid) {
  var p = (D.roster.players||{})[pid]; if(!p) return 0;
  return MATCHES[p.group].reduce(function(s,m){return s+calcMatchPts(pid,m);},0);
}

function renderStats(c) {
  var g = CUR.group;
  var players = Object.entries(D.roster.players||{})
    .filter(function(e){return e[1].group===g;})
    .sort(function(a,b){return a[1].name.localeCompare(b[1].name,'ja');});

  var back = document.createElement('button');
  back.style.cssText='font-size:11px;padding:4px 10px;border:1px solid #d4d7cc;background:#fff;border-radius:20px;cursor:pointer;color:#8a8d82;font-family:inherit;align-self:flex-start';
  back.textContent='← 配置表に戻る'; back.onclick=function(){renderContent();}; c.appendChild(back);

  if (!players.length) {
    var n=document.createElement('div');n.style.cssText='color:#8a8d82;padding:20px;text-align:center;font-size:13px';n.textContent='選手を登録してください';c.appendChild(n);return;
  }
  var maxPts = g==='senior' ? 1 : 3;
  var panel = document.createElement('div'); panel.className='stats-panel';
  var th = document.createElement('div'); th.className='stats-title';
  th.innerHTML = (g==='senior'?'🔴 シニア':'🔵 ペナント')+' <span style="font-size:11px;color:#8a8d82;font-weight:400">最大 '+maxPts.toFixed(1)+'pt</span>';
  panel.appendChild(th);
  var grid=document.createElement('div');grid.className='stats-grid';
  players.forEach(function(e) {
    var id=e[0],p=e[1];
    var total=calcPts(id), pct=Math.min(100,total/maxPts*100), pres=!!D.roster.attendance[id];
    var breakdown=MATCHES[g].map(function(m){return m.replace('戦','')+':'+calcMatchPts(id,m).toFixed(1);}).join(' ');
    var row=document.createElement('div');row.className='srow';
    var dot=document.createElement('div');dot.className='s-dot'+(g==='senior'?' sr':'');
    var info=document.createElement('div');info.className='s-info';
    info.innerHTML='<div class="s-name">'+esc(p.name)+(pres?' <span style="color:#27ae60;font-size:9px">●</span>':'')+'</div><div class="s-detail">'+breakdown+'</div><div class="sbar"><div class="sbar-fill" style="width:'+pct+'%;background:'+(g==='senior'?'#c0392b':'#185FA5')+'"></div></div>';
    var pts=document.createElement('div');pts.className='s-pts'+(pct>=100?' max':'');pts.textContent=total.toFixed(1)+'pt';
    row.append(dot,info,pts);grid.appendChild(row);
  });
  panel.appendChild(grid);c.appendChild(panel);
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function openPosModal(mName,q,posKey,posName,group) {
  posCtx = {mName:mName,q:q,posKey:posKey,isBench:false};
  var lkey=mName+'_'+q, curPid=((D.month.lineups||{})[lkey]||{})[posKey]||'';
  var sel=document.getElementById('pos-sel'); sel.innerHTML='<option value="">-- 未配置（クリア） --</option>';
  var all=Object.entries(D.roster.players||{}).filter(function(e){return e[1].group===group;}).sort(function(a,b){return a[1].name.localeCompare(b[1].name,'ja');});
  var pres=all.filter(function(e){return D.roster.attendance[e[0]];}), abss=all.filter(function(e){return !D.roster.attendance[e[0]];});
  if(pres.length){var og=document.createElement('optgroup');og.label='✅ 出席';pres.forEach(function(e){var o=document.createElement('option');o.value=e[0];o.textContent=e[1].name;if(e[0]===curPid)o.selected=true;og.appendChild(o);});sel.appendChild(og);}
  if(abss.length){var og2=document.createElement('optgroup');og2.label='— 未確認';abss.forEach(function(e){var o=document.createElement('option');o.value=e[0];o.textContent=e[1].name;if(e[0]===curPid)o.selected=true;og2.appendChild(o);});sel.appendChild(og2);}
  document.getElementById('pos-title').textContent=posName+' — '+mName+' '+q;
  openModal('posModal');
}

function openBenchModal(mName,group) {
  posCtx={mName:mName,isBench:true};
  var sel=document.getElementById('pos-sel');sel.innerHTML='<option value="">-- 選択 --</option>';
  var all=Object.entries(D.roster.players||{}).filter(function(e){return e[1].group===group;}).sort(function(a,b){return a[1].name.localeCompare(b[1].name,'ja');});
  var pres=all.filter(function(e){return D.roster.attendance[e[0]];}), abss=all.filter(function(e){return !D.roster.attendance[e[0]];});
  if(pres.length){var og=document.createElement('optgroup');og.label='✅ 出席';pres.forEach(function(e){var o=document.createElement('option');o.value=e[0];o.textContent=e[1].name;og.appendChild(o);});sel.appendChild(og);}
  if(abss.length){var og2=document.createElement('optgroup');og2.label='— 未確認';abss.forEach(function(e){var o=document.createElement('option');o.value=e[0];o.textContent=e[1].name;og2.appendChild(o);});sel.appendChild(og2);}
  document.getElementById('pos-title').textContent='控え — '+mName;
  openModal('posModal');
}

function onSavePos() {
  if(!posCtx)return;
  var pid=document.getElementById('pos-sel').value;
  var mName=posCtx.mName,q=posCtx.q,posKey=posCtx.posKey,isBench=posCtx.isBench;
  if(!D.month.lineups)D.month.lineups={};
  if(isBench){
    var bk=mName+'_bench';if(!D.month.lineups[bk])D.month.lineups[bk]=[];
    if(pid&&D.month.lineups[bk].indexOf(pid)<0)D.month.lineups[bk].push(pid);
  } else {
    var lk=mName+'_'+q;if(!D.month.lineups[lk])D.month.lineups[lk]={};
    if(pid)D.month.lineups[lk][posKey]=pid; else delete D.month.lineups[lk][posKey];
    if(q==='1Q')copy1to2(mName,CUR.group);
  }
  closeModal('posModal');saveMonth();render();
}

function openPlayerModal(pid) {
  pmCtx=pid;
  var p=pid?(D.roster.players||{})[pid]:null;
  document.getElementById('pm-title').textContent=p?'選手を編集':'選手を追加';
  document.getElementById('pm-name').value=p?p.name:'';
  document.getElementById('pm-group').value=p?p.group:(CUR.group||'pennant');
  document.getElementById('pm-del').style.display=p?'':'none';
  openModal('playerModal');
  setTimeout(function(){document.getElementById('pm-name').focus();},150);
}

function onSavePlayer() {
  var name=document.getElementById('pm-name').value.trim();
  if(!name){alert('選手名を入力してください');return;}
  var group=document.getElementById('pm-group').value;
  if(!D.roster.players)D.roster.players={};
  if(pmCtx){
    D.roster.players[pmCtx].name=name;D.roster.players[pmCtx].group=group;
  } else {
    D.roster.players['p'+D.roster.nextId]=({name:name,group:group});D.roster.nextId++;
  }
  closeModal('playerModal');saveRoster();render();
}

function onDeletePlayer() {
  if(!pmCtx||!confirm('この選手を削除しますか？'))return;
  delete D.roster.players[pmCtx]; delete D.roster.attendance[pmCtx];
  Object.keys(D.month.lineups||{}).forEach(function(lk){
    var lu=D.month.lineups[lk];
    if(Array.isArray(lu)){D.month.lineups[lk]=lu.filter(function(id){return id!==pmCtx;});}
    else if(lu&&typeof lu==='object'){Object.keys(lu).forEach(function(k){if(lu[k]===pmCtx)delete lu[k];});}
  });
  closeModal('playerModal');saveRoster();saveMonth();render();
}

// ---- SHARE ----
function openShare() {
  var g=CUR.group;
  var parts=curYM.split('-');
  var t='【メンバー表】'+CUR.emoji+' '+CUR.label+'\n';
  t+=parts[0]+'年'+parseInt(parts[1])+'月　会場：'+(D.month.venue||'未定')+'\n'+'─'.repeat(22)+'\n';
  MATCHES[g].forEach(function(mName){
    t+='\n▶ '+mName+'\n';
    ['1Q','2Q'].forEach(function(q){
      var fm=(D.month.formations&&D.month.formations[mName+'_'+q])||DEF_FM;
      var lu=(D.month.lineups&&D.month.lineups[mName+'_'+q])||{};
      t+='  ['+q+'/'+fm+']\n';
      (FM[fm]||[]).forEach(function(pos){var p=lu[pos.k]?(D.roster.players||{})[lu[pos.k]]:null;t+='    '+pos.p+'：'+(p?p.name:'未登録')+'\n';});
    });
    var bn=((D.month.lineups&&D.month.lineups[mName+'_bench'])||[]).map(function(id){return (D.roster.players||{})[id]&&(D.roster.players||{})[id].name;}).filter(Boolean);
    if(bn.length)t+='  控え：'+bn.join('、')+'\n';
  });
  if(isEdit){
    t+='\n'+'─'.repeat(22)+'\n■ 出場ポイント\n';
    Object.entries(D.roster.players||{}).filter(function(e){return e[1].group===g;}).sort(function(a,b){return a[1].name.localeCompare(b[1].name,'ja');}).forEach(function(e){
      var total=calcPts(e[0]);
      var bd=MATCHES[g].map(function(m){return m.replace('戦','')+':'+calcMatchPts(e[0],m).toFixed(1);}).join(' ');
      t+=(D.roster.attendance[e[0]]?'✅':'  ')+' '+e[1].name+'：'+total.toFixed(1)+'pt ('+bd+')\n';
    });
  }
  document.getElementById('share-text').value=t;
  openModal('shareModal');
}

function onCopy() {
  var t=document.getElementById('share-text').value;
  var btn=document.getElementById('copyBtn');
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){btn.textContent='✅ コピー完了';setTimeout(function(){btn.textContent='📋 コピー';},2200);});}
  else{document.getElementById('share-text').select();document.execCommand('copy');btn.textContent='✅ コピー完了';setTimeout(function(){btn.textContent='📋 コピー';},2200);}
}

// ---- RESET ----
function openSheet(){document.getElementById('sheetWrap').classList.add('open');document.getElementById('sheet').classList.add('open');}
function closeSheet(){document.getElementById('sheetWrap').classList.remove('open');document.getElementById('sheet').classList.remove('open');}

function onReset(type) {
  if(type==='partial'){
    if(!confirm('配置をリセットします。選手名簿・出欠は保持されます。'))return;
    D.month.lineups={}; D.month.formations={}; D.month.venue='';
    var g=CUR.group; MATCHES[g].forEach(function(m){D.month.formations[m+'_1Q']=DEF_FM;D.month.formations[m+'_2Q']=DEF_FM;});
  } else {
    if(!confirm('この月のデータをすべて削除します。'))return;
    D.month=emptyMonth();
    lsSet(lsKey('month:'+curYM),null);
    if(fbDB)fbDB.ref(monthPath()).remove();
  }
  closeSheet();saveMonth();render();
}

// ---- ADMIN SWITCH ----
function openAdminSw() {
  var ex=document.getElementById('adminSwSel');if(ex){ex.remove();return;}
  var sel=document.createElement('select');sel.id='adminSwSel';
  sel.style.cssText='position:fixed;top:55px;right:10px;z-index:400;background:#fff;border:1px solid #d4d7cc;border-radius:10px;padding:6px;font-size:13px;font-family:"Noto Sans JP",sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.15)';
  TEAMS.forEach(function(t){var o=document.createElement('option');o.value=t.id;o.textContent=t.emoji+' '+t.label;if(t.id===CUR.id)o.selected=true;sel.appendChild(o);});
  sel.addEventListener('change',function(){
    var meta=TEAMS.find(function(t){return t.id===sel.value;});sel.remove();
    if(fbListener){fbListener();fbListener=null;}
    CUR=meta;
    document.getElementById('topTeam').textContent=meta.emoji+' '+meta.name+' '+(meta.group==='senior'?'シニア':'ペナント');
    loadData(function(){render();});
  });
  document.body.appendChild(sel);
  setTimeout(function(){document.addEventListener('click',function h(e){if(e.target!==sel){sel.remove();document.removeEventListener('click',h);}},true);},100);
}

// Polyfill for older browsers
if(!Object.values){Object.values=function(o){return Object.keys(o).map(function(k){return o[k];});};}
if(!Object.entries){Object.entries=function(o){return Object.keys(o).map(function(k){return [k,o[k]];});};}
if(!Array.prototype.find){Array.prototype.find=function(fn){for(var i=0;i<this.length;i++){if(fn(this[i],i,this))return this[i];}return undefined;};}
if(!String.prototype.padStart){String.prototype.padStart=function(n,c){var s=String(this);while(s.length<n)s=(c||' ')+s;return s;};}
function shn(n){return n&&n.length>5?n.slice(0,4)+'…':n||'';}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
