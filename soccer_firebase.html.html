<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="配置図">
<meta name="theme-color" content="#1b5e20">
<title>⚽ 9人制サッカー配置図</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ============================================================
   RESET & CUSTOM PROPERTIES
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2e7d32;--green2:#388e3c;--green3:#1b5e20;
  --accent:#ffc107;--danger:#f44336;--changed:#ff1744;
  --bg:#0f0f1a;--card:#1a1a2e;--sidebar:#161625;--border:#2a2a40;
  --text:#e0e0e0;--dim:#777;
  --sw:148px;--hh:54px;
}
html,body{height:100%;overflow:hidden;
  font-family:'Hiragino Kaku Gothic ProN','Meiryo','Yu Gothic',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;
  -webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
button{cursor:pointer;border:none;border-radius:6px;padding:6px 12px;
  font-family:inherit;font-size:13px;transition:filter .12s}
button:active{filter:brightness(.8)}
select{background:#1c1c2e;color:var(--text);border:1px solid var(--border);
  border-radius:6px;padding:5px 8px;font-family:inherit;font-size:13px}
input[type=text],input[type=password],input[type=month]{
  background:#1c1c2e;color:var(--text);border:1px solid var(--border);
  border-radius:6px;padding:8px 10px;width:100%;font-family:inherit;
  font-size:14px;outline:none}
input:focus{border-color:var(--accent)}

/* ============================================================
   LOADING
============================================================ */
#loading{position:fixed;inset:0;background:var(--green3);z-index:9000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spin{width:44px;height:44px;border:4px solid rgba(255,255,255,.25);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:rgba(255,255,255,.8)}

/* ============================================================
   LOGIN
============================================================ */
#login{position:fixed;inset:0;z-index:8000;display:none;align-items:center;
  justify-content:center;padding:16px;
  background:linear-gradient(150deg,#0a2a0a 0%,#1a4a1a 55%,#0a2a1a 100%)}
.lcard{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:18px;padding:28px 22px;width:100%;max-width:400px;
  backdrop-filter:blur(10px)}
.l-logo{text-align:center;font-size:40px;margin-bottom:6px}
.l-title{text-align:center;font-size:21px;font-weight:700;color:#fff;margin-bottom:4px}
.l-sub{text-align:center;font-size:12px;color:rgba(255,255,255,.45);margin-bottom:22px}
.step-lbl{font-size:11px;color:rgba(255,255,255,.45);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:8px}
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.team-btn{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);
  border-radius:12px;padding:13px 6px;text-align:center;color:#fff;line-height:1.5;
  display:flex;flex-direction:column;align-items:center;gap:2px}
.team-btn .te{font-size:24px}.team-btn .tn{font-size:13px;font-weight:700}
.team-btn .ts{font-size:10px;color:rgba(255,255,255,.45)}
.team-btn.sel{background:rgba(56,142,60,.45);border-color:var(--accent)}
.team-btn:hover{background:rgba(255,255,255,.14)}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.role-btn{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);
  border-radius:10px;padding:12px 8px;text-align:center;color:rgba(255,255,255,.85);
  display:flex;flex-direction:column;align-items:center;gap:2px}
.role-btn .rn{font-size:13px;font-weight:700}.role-btn .rr{font-size:10px;color:rgba(255,255,255,.4)}
.role-btn.sel{background:rgba(255,193,7,.2);border-color:var(--accent);color:#fff}
.role-btn:hover{background:rgba(255,255,255,.11)}
.l-back{background:transparent;color:rgba(255,255,255,.45);font-size:12px;
  padding:4px;text-decoration:underline;margin-bottom:10px;display:inline-block}
.l-pwlbl{font-size:12px;color:rgba(255,255,255,.55);margin-bottom:6px}
.l-err{font-size:12px;color:#ff6b6b;text-align:center;min-height:18px;margin-top:6px}
.l-submit{width:100%;background:var(--accent);color:#000;font-size:15px;
  font-weight:700;padding:12px;border-radius:10px;margin-top:12px}

/* ============================================================
   APP LAYOUT
============================================================ */
#app{display:none;flex-direction:column;height:100%}

/* Header */
#hdr{height:var(--hh);background:var(--green3);border-bottom:2px solid var(--green2);
  display:flex;align-items:center;padding:0 10px;gap:7px;flex-shrink:0;z-index:100;
  overflow:hidden}
.h-team{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:130px;flex-shrink:0}
.h-badge{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.h-badge.mgr{background:var(--accent);color:#000}
.h-badge.view{background:#444;color:#ddd}
.h-sp{flex:1;min-width:2px}
.h-btn{background:rgba(255,255,255,.1);color:#fff;font-size:11px;
  padding:5px 7px;white-space:nowrap;flex-shrink:0}

/* Main */
#main{flex:1;display:flex;min-height:0;overflow:hidden}

/* Sidebar */
#sb{width:var(--sw);background:var(--sidebar);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-head{padding:8px;background:rgba(0,0,0,.25);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:700}
.sb-cnt{color:var(--dim);font-size:10px;font-weight:400}
.sb-tools{padding:5px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:3px}
.sbt{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);font-size:11px;
  padding:5px 7px;text-align:left;border-radius:5px}
.pl-list{flex:1;overflow-y:auto;padding:5px}
.pl-item{display:flex;align-items:center;gap:5px;padding:6px 7px;border-radius:7px;
  margin-bottom:3px;border:1px solid transparent;cursor:grab;
  user-select:none;-webkit-user-select:none;touch-action:none;
  background:rgba(255,255,255,.04);transition:background .12s}
.pl-item.present{background:rgba(46,125,50,.22);border-color:rgba(76,175,80,.35)}
.pl-item.absent{opacity:.42}
.pl-item.dragging{opacity:.15;cursor:grabbing}
.pl-cb{width:14px;height:14px;cursor:pointer;flex-shrink:0;accent-color:#4caf50}
.pl-name{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-pts{font-size:10px;color:var(--accent);font-weight:700}

/* Content */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px;
  display:flex;flex-direction:column;gap:12px}

/* Match card */
.mc{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.mc-head{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border)}
.mc-title{font-size:15px;font-weight:700;color:var(--accent)}
.mc-copy{font-size:10px;padding:4px 9px;background:rgba(33,150,243,.25);
  color:#90caf9;border:1px solid rgba(33,150,243,.35)}
.mc-body{display:flex;gap:6px;padding:8px}
.quarter{flex:1;min-width:0;display:flex;flex-direction:column}
.q-label{text-align:center;font-size:11px;font-weight:700;color:var(--dim);
  margin-bottom:4px;padding:3px;background:rgba(0,0,0,.2);border-radius:5px}
.f-row{display:flex;gap:4px;margin-bottom:5px}
.f-row select{flex:1;font-size:10px;padding:3px 4px}
.f-lbl{text-align:center;font-size:10px;color:var(--dim);margin-bottom:5px}

/* Pitch */
.pitch{position:relative;width:100%;padding-bottom:150%;
  border-radius:8px;overflow:hidden;background:#2e7d32;
  border:2px solid rgba(255,255,255,.22)}
/* Field markings via separate overlay */
.pitch-lines{position:absolute;inset:0;pointer-events:none}
.pitch-lines::before{content:'';position:absolute;
  top:4%;left:10%;width:80%;height:92%;
  border:1.5px solid rgba(255,255,255,.4)}
.pitch-lines::after{content:'';position:absolute;
  top:50%;left:10%;width:80%;height:0;
  border-top:1.5px solid rgba(255,255,255,.4)}
.pitch-cc{position:absolute;top:50%;left:50%;
  width:18%;padding-bottom:18%;
  transform:translate(-50%,-50%);
  border:1.5px solid rgba(255,255,255,.4);border-radius:50%;pointer-events:none}
.pitch-ga{position:absolute;left:32%;width:36%;height:9%;
  border:1.5px solid rgba(255,255,255,.4);pointer-events:none}
.pitch-ga.top{top:4%;border-top:none}
.pitch-ga.bot{bottom:4%;border-bottom:none}

/* Position dot */
.pdot{position:absolute;transform:translate(-50%,-50%);
  width:34px;height:34px;border-radius:50%;
  border:2px solid rgba(255,255,255,.42);
  background:rgba(0,0,0,.22);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;transition:background .12s,border-color .12s;
  pointer-events:all}
.pdot:hover{border-color:#fff;background:rgba(255,255,255,.15)}
.pdot.occ{background:rgba(21,63,128,.85);border-color:rgba(100,160,255,.9)}
.pdot.occ-gk{background:rgba(130,60,0,.85);border-color:rgba(255,160,50,.9)}
.pdot.changed{background:rgba(180,0,30,.85);border-color:var(--changed);
  animation:pls 1.5s infinite}
@keyframes pls{0%,100%{box-shadow:0 0 4px rgba(255,23,68,.4)}
  50%{box-shadow:0 0 12px rgba(255,23,68,.75)}}
.pdot.dov{background:rgba(0,200,80,.3);border-color:#00e676}
.p-lb{font-size:7.5px;color:rgba(255,255,255,.55);line-height:1}
.p-nm{font-size:8.5px;font-weight:700;color:#fff;
  max-width:30px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}

/* Bench */
.bench-wrap{padding:8px 10px;border-top:1px solid var(--border)}
.bench-head{font-size:11px;color:var(--dim);margin-bottom:5px;
  display:flex;align-items:center;justify-content:space-between}
.bench-area{display:flex;flex-wrap:wrap;gap:4px;min-height:28px;padding:5px;
  border:1px dashed var(--border);border-radius:7px;background:rgba(255,255,255,.02)}
.bench-area.dov{background:rgba(0,200,80,.07);border-color:#00e676}
.bench-chip{display:flex;align-items:center;gap:3px;
  background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);
  border-radius:14px;padding:3px 8px;font-size:11px;cursor:default}
.bench-rm{background:none;color:#ff6b6b;font-size:14px;padding:0;line-height:1;
  width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;flex-shrink:0}
.bench-hint{color:rgba(255,255,255,.2);font-size:11px;align-self:center}

/* Stats */
#stats{display:none;flex-direction:column;border-top:2px solid var(--green3);
  background:#090912;max-height:38vh;overflow-y:auto;flex-shrink:0;padding:10px;gap:8px}
.st-title{font-size:14px;font-weight:700;color:var(--accent)}
.st-tbl{width:100%;border-collapse:collapse;font-size:12px}
.st-tbl th{background:#111;padding:6px 8px;text-align:left;font-size:11px;
  color:var(--dim);position:sticky;top:0}
.st-tbl td{padding:5px 8px;border-bottom:1px solid #1a1a2a;vertical-align:middle}
.bar-bg{background:#222;border-radius:4px;height:7px;overflow:hidden}
.bar-fg{height:100%;background:linear-gradient(to right,var(--green2),#81c784);
  border-radius:4px;transition:width .4s}

/* Drag ghost */
#ghost{position:fixed;pointer-events:none;z-index:9999;
  background:rgba(21,63,128,.92);border:2px solid rgba(100,160,255,.9);
  border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;
  color:#fff;white-space:nowrap;display:none;
  transform:translate(-50%,-130%)}

/* Modals */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);
  z-index:5000;align-items:center;justify-content:center;padding:16px}
.mbg.open{display:flex}
.mbox{background:var(--card);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:360px;padding:20px;max-height:85vh;overflow-y:auto}
.m-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:14px}
.mpl-list{display:flex;flex-direction:column;gap:5px;max-height:45vh;overflow-y:auto}
.mpl-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;text-align:left;color:var(--text);font-size:13px}
.mpl-btn:hover{background:rgba(255,255,255,.11);border-color:var(--accent)}
.mpl-btn.placed{opacity:.38;cursor:not-allowed}
.m-clear{background:var(--danger);color:#fff;width:100%;margin-top:8px;padding:10px}
.m-cancel{background:#333;color:#ccc;width:100%;margin-top:5px;padding:10px}
.menu-btn{display:block;width:100%;text-align:left;padding:11px 14px;
  border-radius:8px;margin-bottom:6px;color:#fff;font-size:13px}
.roster-row{display:flex;align-items:center;gap:8px;padding:7px 0;
  border-bottom:1px solid var(--border)}
.roster-del{background:var(--danger);color:#fff;font-size:11px;padding:3px 9px}

/* ★追加：名簿モーダルの出席チェック＆強調 */
.roster-att{display:flex;align-items:center;gap:6px}
.roster-cb{width:16px;height:16px;accent-color:#4caf50}
.roster-row.present{background:rgba(46,125,50,.12);border-radius:8px;padding:7px 6px}

.in-row{display:flex;gap:8px;margin-top:10px}
.in-row input{flex:1}
.in-row button{white-space:nowrap;background:var(--green2);color:#fff;padding:8px 12px}
.pw-row{margin-bottom:12px}
.pw-lbl{font-size:12px;color:var(--dim);margin-bottom:5px}
.m-acts{display:flex;gap:8px;margin-top:14px}
.m-save{flex:1;background:var(--accent);color:#000;font-weight:700;padding:10px}
.m-can2{flex:1;background:#333;color:#ccc;padding:10px}
.m-note{font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.6}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}

/* Mobile */
@media(max-width:480px){
  :root{--sw:115px}
  .pdot{width:28px;height:28px}
  .p-nm{font-size:7.5px;max-width:24px}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spin"></div>
  <p>読み込み中...</p>
</div>

<!-- LOGIN -->
<div id="login">
  <div class="lcard">
    <div class="l-logo">⚽</div>
    <div class="l-title">サッカー配置図</div>
    <div class="l-sub">9人制チーム メンバー管理</div>

    <!-- Step1: Team -->
    <div id="ls1">
      <div class="step-lbl">Step 1 ─ チームを選択</div>
      <div class="team-grid">
        <button class="team-btn" data-team="sharks">
          <span class="te">🦈</span><span class="tn">Sharks</span><span class="ts">1組</span>
        </button>
        <button class="team-btn" data-team="bulls">
          <span class="te">🐂</span><span class="tn">Bulls</span><span class="ts">2組</span>
        </button>
        <button class="team-btn" data-team="hawks">
          <span class="te">🦅</span><span class="tn">Hawks</span><span class="ts">3組</span>
        </button>
      </div>
    </div>

    <!-- Step2: Role -->
    <div id="ls2" style="display:none">
      <button class="l-back" id="ls2-back">← チームを変更</button>
      <div class="step-lbl">Step 2 ─ 種別・ロールを選択</div>
      <div class="role-grid">
        <button class="role-btn" data-group="senior" data-role="viewer">
          <span class="rn">シニア</span><span class="rr">閲覧のみ</span>
        </button>
        <button class="role-btn" data-group="senior" data-role="manager">
          <span class="rn">シニア</span><span class="rr">監督用 ✏</span>
        </button>
        <button class="role-btn" data-group="pennant" data-role="viewer">
          <span class="rn">ペナント</span><span class="rr">閲覧のみ</span>
        </button>
        <button class="role-btn" data-group="pennant" data-role="manager">
          <span class="rn">ペナント</span><span class="rr">監督用 ✏</span>
        </button>
      </div>
    </div>

    <!-- Step3: Password -->
    <div id="ls3" style="display:none">
      <button class="l-back" id="ls3-back">← ロールを変更</button>
      <div class="step-lbl">Step 3 ─ パスワードを入力</div>
      <div class="l-pwlbl" id="ls3-lbl">パスワード</div>
      <input type="password" id="ls3-pw" placeholder="パスワード" autocomplete="off">
      <div class="l-err" id="ls3-err"></div>
      <button class="l-submit" id="ls3-ok">ログイン</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Header -->
  <div id="hdr">
    <div class="h-team" id="h-team">---</div>
    <div class="h-badge" id="h-badge">---</div>
    <div class="h-sp"></div>
    <select id="mon-sel" style="max-width:115px;font-size:12px"></select>
    <button class="h-btn" id="btn-addmon">＋月</button>
    <button class="h-btn" id="btn-stats">📊</button>
    <button class="h-btn" id="btn-menu">⚙</button>
    <button class="h-btn" id="btn-out" style="background:rgba(244,67,54,.2)">⏻</button>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Sidebar -->
    <div id="sb">
      <div class="sb-head">
        <span>選手</span>
        <span class="sb-cnt" id="sb-cnt">0/0</span>
      </div>
      <div class="sb-tools" id="sb-tools"></div>
      <div class="pl-list" id="pl-list"></div>
    </div>
    <!-- Content -->
    <div id="content"></div>
  </div>

  <!-- Stats -->
  <div id="stats">
    <div class="st-title">📊 出場ポイント集計</div>
    <div id="st-body"></div>
  </div>
</div>

<!-- Drag ghost -->
<div id="ghost"></div>

<!-- Modal: Position -->
<div class="mbg" id="m-pos">
  <div class="mbox">
    <div class="m-title" id="m-pos-ttl">選手を選択</div>
    <div class="mpl-list" id="m-pos-list"></div>
    <button class="m-clear" id="m-pos-clear">このポジションをクリア</button>
    <button class="m-cancel" id="m-pos-cancel">キャンセル</button>
  </div>
</div>

<!-- Modal: Menu -->
<div class="mbg" id="m-menu">
  <div class="mbox">
    <div class="m-title">⚙ 監督メニュー</div>
    <button class="menu-btn" id="mm-roster" style="background:#1e3a6e">👥 選手名簿を編集</button>
    <button class="menu-btn" id="mm-rpos"   style="background:#5c3a00">🔄 配置リセット（名簿・出欠は保持）</button>
    <button class="menu-btn" id="mm-rall"   style="background:#5c0000">⚠ 当月を完全リセット</button>
    <button class="menu-btn" id="mm-pw"     style="background:#2a2a6e">🔐 パスワード変更</button>
    <button class="menu-btn" id="mm-close"  style="background:#252535">✕ 閉じる</button>
  </div>
</div>

<!-- Modal: Roster -->
<div class="mbg" id="m-roster">
  <div class="mbox" style="max-width:380px">
    <div class="m-title">👥 選手名簿</div>
    <div id="roster-list" style="max-height:45vh;overflow-y:auto"></div>
    <div class="in-row">
      <input type="text" id="new-name" placeholder="選手名を入力">
      <button id="btn-addpl">追加</button>
    </div>
    <button class="m-cancel" id="btn-croster" style="margin-top:10px">閉じる</button>
  </div>
</div>

<!-- Modal: Password -->
<div class="mbg" id="m-pw">
  <div class="mbox">
    <div class="m-title">🔐 パスワード変更</div>
    <div class="pw-row">
      <div class="pw-lbl">閲覧用パスワード</div>
      <input type="text" id="pw-v" placeholder="（変更しない場合は空欄）">
    </div>

let _db = null, _ok = false;
const _ls = []; // active listeners

function initFB() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(FB_CFG);
    _db = firebase.database();
    _ok = true;
    console.log('Firebase: OK');
  } catch(e) {
    console.warn('Firebase init failed (offline mode):', e.message);
  }
}

const fbGet = p => new Promise(res => {
  if (!_db) return res(null);
  _db.ref(p).once('value', s=>res(s.val()), ()=>res(null));
});
const fbSet = (p,v) => { if(!_db) return P(); return _db.ref(p).set(v).catch(()=>{}); };
const fbDel = p => { if(!_db) return P(); return _db.ref(p).remove().catch(()=>{}); };
const P = () => Promise.resolve();

function fbOn(path, cb) {
  if (!_db) return;
  const ref = _db.ref(path);
  const fn = ref.on('value', s=>cb(s.val()), ()=>{});
  _ls.push({ref, fn});
}
function fbOff() {
  _ls.forEach(({ref,fn})=>ref.off('value',fn));
  _ls.length = 0;
}

/* Firebase stores arrays as objects with numeric keys */
function toArr(v) {
  if (!v) return [];
  if (Array.isArray(v)) return v;
  if (typeof v==='object') {
    return Object.keys(v).sort((a,b)=>+a - +b).map(k=>v[k]).filter(x=>x!=null);
  }
  return [];
}

/* ================================================================
   HELPERS
================================================================ */
const UID  = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const YM   = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };
const fmYM = ym => { const [y,m]=ym.split('-'); return `${y}年${parseInt(m)}月`; };
const esc  = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const tPath = ()  => `teams/${S.key}`;
const mPath = ()  => `teams/${S.key}/${S.month}`;
const tLabel= ()  => `${TEAMS[S.team].e}${TEAMS[S.team].n}_${GROUPS[S.group]}`;
const empty = t   => ({ matchType:t, q1:{formation:DEF_FORM,positions:{}}, q2:{formation:DEF_FORM,positions:{}}, bench:[] });

function normMatch(raw, fallbackType) {
  if (!raw) return empty(fallbackType);
  return {
    matchType: raw.matchType || fallbackType,
    q1: { formation: raw.q1?.formation||DEF_FORM, positions: raw.q1?.positions||{} },
    q2: { formation: raw.q2?.formation||DEF_FORM, positions: raw.q2?.positions||{} },
    bench: toArr(raw.bench),
  };
}

function calcPoints() {
  const pts = {};
  Object.keys(S.roster).forEach(id=>{ pts[id]={total:0,detail:[]}; });
  S.matches.forEach(m => {
    const q1s = new Set(Object.values(m.q1?.positions||{}).filter(Boolean));
    const q2s = new Set(Object.values(m.q2?.positions||{}).filter(Boolean));
    Object.keys(S.roster).forEach(id => {
      const p = (q1s.has(id)?0.5:0)+(q2s.has(id)?0.5:0);
      pts[id].detail.push({type:m.matchType, pts:p});
      pts[id].total += p;
    });
  });
  return pts;
}

function sortedPlayers() {
  return Object.entries(S.roster)
    .map(([id,d])=>({id, name:d.name||'', present:!!S.attend[id]}))
    .sort((a,b)=>{ if(a.present!==b.present) return b.present?1:-1; return a.name.localeCompare(b.name,'ja'); });
}

async function loadMonths() {
  const d = await fbGet(tPath());
  const ms = [];
  if (d) Object.keys(d).forEach(k=>{ if(/^\d{4}-\d{2}$/.test(k)) ms.push(k); });
  ms.sort();
  const cm = YM();
  if (!ms.includes(cm)) ms.push(cm);
  S.months = ms;
}


async function loadMonth() {
  const mp = mPath();
  let roster = await fbGet(`${mp}/roster`);
  
  // 自動反映ロジック：名簿が空、または保存された名簿の人数がデフォルトより著しく少ない場合に補完（監督のみ）
  const def = DEFAULT_ROSTERS[S.team]?.[S.group] || [];
  if (S.isMgr && (!roster || Object.keys(roster).length === 0)) {
    roster = {};
    def.forEach((name, i) => {
      const id = 'p_def_' + Date.now() + '_' + i;
      roster[id] = { id, name };
    });
    await fbSet(`${mp}/roster`, roster);
  }
  
  S.roster = roster || {};
  S.attend = await fbGet(`${mp}/attendance`) || {};
  const raw = await fbGet(`${mp}/matches`);
  applyMatches(raw);
}


function applyMatches(raw) {
  const types = MTYPES[S.group];
  if (raw) {
    const arr = toArr(raw);
    S.matches = arr.map((m,i)=>normMatch(m, types[i]||`試合${i+1}`));
    while (S.matches.length < types.length)
      S.matches.push(empty(types[S.matches.length]));
  } else {
    S.matches = types.map(t=>empty(t));
  }
}

function startListeners() {
  fbOff();
  const mp = mPath();
  fbOn(`${mp}/roster`,    v=>{ S.roster=v||{}; renderSB(); renderContent(); });
  fbOn(`${mp}/attendance`,v=>{ S.attend=v||{}; renderSB(); renderContent(); });
  fbOn(`${mp}/matches`,   v=>{ applyMatches(v); renderContent(); if(S.statsOpen) renderStats(); });
}

================================================================ */
async function setPos(mi,q,posId,pid) {
  const p=`${mPath()}/matches/${mi}/${q}/positions/${posId}`;
  pid ? await fbSet(p,pid) : await fbDel(p);
  if(!S.matches[mi][q].positions) S.matches[mi][q].positions={};
  pid ? (S.matches[mi][q].positions[posId]=pid) : delete S.matches[mi][q].positions[posId];
}
async function setForm(mi,q,form) {
  await fbSet(`${mPath()}/matches/${mi}/${q}/formation`,form);
  S.matches[mi][q].formation=form;
}
async function addBench(mi,pid) {
  const b=[...(S.matches[mi].bench||[])];
  if(b.includes(pid)) return;
  b.push(pid);
  await fbSet(`${mPath()}/matches/${mi}/bench`,b);
  S.matches[mi].bench=b;
}
async function rmBench(mi,idx) {
  const b=[...(S.matches[mi].bench||[])];
  b.splice(idx,1);
  await fbSet(`${mPath()}/matches/${mi}/bench`,b);
  S.matches[mi].bench=b;
}
async function setAttend(pid, present) {
  const ap = `${mPath()}/attendance/${pid}`;

  if (present) {
    await fbSet(ap, true);
    S.attend[pid] = true;
    for (let i = 0; i < S.matches.length; i++) await addBench(i, pid);
    return;
  }

  await fbDel(ap);
  delete S.attend[pid];

  for (let i = 0; i < S.matches.length; i++) {
    const b = [...(S.matches[i].bench || [])];
    const nb = b.filter(x => x !== pid);
    if (nb.length !== b.length) {
      await fbSet(`${mPath()}/matches/${i}/bench`, nb);
      S.matches[i].bench = nb;
    }
  }

  for (let i = 0; i < S.matches.length; i++) {
    for (const q of ['q1', 'q2']) {
      const pos = S.matches[i]?.[q]?.positions || {};
      for (const [posId, v] of Object.entries(pos)) {
        if (v === pid) {
          await fbDel(`${mPath()}/matches/${i}/${q}/positions/${posId}`);
          delete S.matches[i][q].positions[posId];
        }
      }
    }
  }
}
async function addPlayer(name) {
  const id=UID();
  await fbSet(`${mPath()}/roster/${id}`,{name:name.trim()});
  S.roster[id]={name:name.trim()};
}
async function delPlayer(id) {
  await fbDel(`${mPath()}/roster/${id}`);
  await fbDel(`${mPath()}/attendance/${id}`);
  delete S.roster[id]; delete S.attend[id];
  for(let i=0;i<S.matches.length;i++){
    const m=S.matches[i];
    for(const q of['q1','q2']){
      const pos=m[q]?.positions||{};
      for(const [k,v] of Object.entries(pos)){
        if(v===id){ await fbDel(`${mPath()}/matches/${i}/${q}/positions/${k}`); delete S.matches[i][q].positions[k]; }
      }
    }
    const nb=(m.bench||[]).filter(b=>b!==id);
    await fbSet(`${mPath()}/matches/${i}/bench`,nb);
    S.matches[i].bench=nb;
  }
}
async function copyQ1toQ2(mi) {
  const q1=S.matches[mi]?.q1;
  if(!q1) return;
  const q2={formation:q1.formation, positions:{...q1.positions}};
  await fbSet(`${mPath()}/matches/${mi}/q2`,q2);
  S.matches[mi].q2=q2;
}
async function resetPos() {
  if(!confirm('当月の配置をリセットします。名簿・出欠は保持されます。')) return;
  const types=MTYPES[S.group];
  const em=types.map(t=>empty(t));

async function resetAll() {
  if(!confirm('当月の全データを削除します。この操作は取り消せません。')) return;
  if(!confirm('本当によろしいですか？')) return;
  await fbDel(mPath());
  S.roster={}; S.attend={};
  S.matches=MTYPES[S.group].map(t=>empty(t));
  renderSB(); renderContent();
}
async function doAddMonth(ym) {
  if(S.months.includes(ym)){ alert('その月は既に存在します'); return; }
  const prev=[...S.months].filter(m=>m<ym).pop();
  let roster={}, attend={};
  if(prev){
    roster=await fbGet(`${tPath()}/${prev}/roster`)||{};
    attend=await fbGet(`${tPath()}/${prev}/attendance`)||{};
  }
  const matches=MTYPES[S.group].map(t=>empty(t));
  await fbSet(`${tPath()}/${ym}`,{roster,attendance:attend,matches});
  S.months.push(ym); S.months.sort();
  S.month=ym; S.roster=roster; S.attend=attend; S.matches=matches;
  renderMonSel(); renderSB(); renderContent(); startListeners();
}

  const pts=calcPoints(), pls=sortedPlayers();
  const pres=pls.filter(p=>p.present).length;
  document.getElementById('sb-cnt').textContent=`${pres}/${pls.length}`;
  document.getElementById('sb-tools').innerHTML=S.isMgr?`
    <button class="sbt" data-a="roster">👥 名簿編集</button>
    <button class="sbt" data-a="rpos">🔄 配置リセット</button>`:''  ;
  const list=document.getElementById('pl-list');
  if(!pls.length){ list.innerHTML='<div style="padding:16px;text-align:center;font-size:12px;color:#444">選手を追加してください</div>'; return; }
  list.innerHTML=pls.map(p=>{
    const tot=pts[p.id]?.total||0;
    return `<div class="pl-item ${p.present?'present':'absent'}"
               data-pid="${p.id}" data-name="${esc(p.name)}" draggable="false">
      ${S.isMgr?`<input type="checkbox" class="pl-cb" data-pid="${p.id}"${p.present?' checked':''}>`:''}
      <span class="pl-name">${esc(p.name)}</span>
      ${tot>0?`<span class="pl-pts">${tot.toFixed(1)}</span>`:''}
    </div>`;
  }).join('');
}

/* ================================================================
   RENDER — CONTENT (MATCH CARDS)
================================================================ */
function renderContent() {
  const el=document.getElementById('content');
  const sc=el.scrollTop;
  el.innerHTML=S.matches.map((m,i)=>renderCard(m,i)).join('');
  el.scrollTop=sc;
}

function renderCard(m,mi) {
  return `<div class="mc" data-mi="${mi}">
    <div class="mc-head">
      <span class="mc-title">${esc(m.matchType)}</span>
      ${S.isMgr?`<button class="mc-copy" data-a="cpq" data-mi="${mi}">1Q→2Qコピー</button>`:''}
    </div>
    <div class="mc-body">
      ${renderQ(m,mi,'q1')}
      ${renderQ(m,mi,'q2')}
    </div>
    <div class="bench-wrap">
      <div class="bench-head">
        <span>控え（1Q/2Q共通）</span>
        <span style="font-size:10px">${(m.bench||[]).length}人</span>
      </div>
      ${renderBench(m.bench||[],mi)}
    </div>
  </div>`;
}

function renderQ(m,mi,q) {
  const qd=m[q]||{formation:DEF_FORM,positions:{}};
  const form=qd.formation||DEF_FORM;
  const pos=qd.positions||{};
  const fdef=FORMS[form]||FORMS[DEF_FORM];
  const fsel=S.isMgr
    ?`<div class="f-row"><select data-a="form" data-mi="${mi}" data-q="${q}">
        ${Object.keys(FORMS).map(f=>`<option value="${f}"${f===form?' selected':''}>${f}</option>`).join('')}
       </select></div>`
    :`<div class="f-lbl">${esc(form)}</div>`;
  const dots=fdef.map(p=>{
    const pid=pos[p.id]||null;
    const nm=pid?(S.roster[pid]?.name||'?'):'';
    let cls='pdot';
    if(pid){
      cls += p.id==='gk' ? ' occ-gk' : ' occ';
    }
    if(q==='q2'){
      const q1pid=(m.q1?.positions?.[p.id])||null;
      if(pid && q1pid && pid!==q1pid){
        cls='pdot changed';
      }
    }
    const act=S.isMgr?'cpos':'noop';
    return `<div class="${cls}" style="left:${p.x}%;top:${p.y}%"
                data-a="${act}" data-mi="${mi}" data-q="${q}" data-pos="${p.id}" data-pid="${pid||''}">
      <span class="p-lb">${p.lb}</span>
      ${nm?`<span class="p-nm">${esc(nm)}</span>`:''}
    </div>`;
  }).join('');
  return `<div class="quarter">
    <div class="q-label">${q==='q1'?'1Q（前半）':'2Q（後半）'}</div>
    ${fsel}
    <div class="pitch" data-a="bdrop" data-mi="${mi}" data-q="${q}">
      <div class="pitch-lines"></div>
      <div class="pitch-cc"></div>
      <div class="pitch-ga top"></div>
      <div class="pitch-ga bot"></div>
      ${dots}
    </div>
  </div>`;
}

function renderBench(bench,mi) {
  const chips=bench.filter(pid=>S.roster[pid]).map((pid,i)=>`
    <span class="bench-chip">
      ${esc(S.roster[pid]?.name||'?')}
      ${S.isMgr?`<button class="bench-rm" data-a="rmb" data-mi="${mi}" data-bi="${i}" title="控えから削除">×</button>`:''}
    </span>`).join('');
  return `<div class="bench-area" data-a="bdrop" data-mi="${mi}">
    ${chips}${!chips&&S.isMgr?'<span class="bench-hint">ここにドロップ</span>':''}
  </div>`;
}

/* ================================================================
   RENDER — STATS
================================================================ */
function renderStats() {
  const pts=calcPoints(), pls=sortedPlayers();
  const maxP=S.group==='senior'?1.0:3.0;
  const types=S.matches.map(m=>m.matchType);
  if(!pls.length){ document.getElementById('st-body').innerHTML='<div style="color:#444;font-size:12px">選手データなし</div>'; return; }
  document.getElementById('st-body').innerHTML=`
    <table class="st-tbl">
      <thead><tr>
        <th>選手名</th>
        ${types.map(t=>`<th>${esc(t)}</th>`).join('')}
        <th>合計</th>
        <th style="min-width:90px">進捗</th>
      </tr></thead>
      <tbody>
        ${pls.map(p=>{
          const pd=pts[p.id]||{total:0,detail:[]};
          const pct=Math.round(Math.min(100,pd.total/maxP*100));
          return `<tr>
            <td>${esc(p.name)}</td>
            ${pd.detail.map(d=>`<td style="text-align:center;color:${d.pts>0?'#81c784':'#444'}">${d.pts>0?d.pts.toFixed(1):'-'}</td>`).join('')}
            <td style="text-align:center;font-weight:700;color:${pd.total>0?'#81c784':'#444'}">${pd.total.toFixed(1)}</td>
            <td>
              <div class="bar-bg"><div class="bar-fg" style="width:${pct}%"></div></div>
              <div style="font-size:9px;color:#444;text-align:right;margin-top:2px">${pct}%</div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

/* ================================================================
   DRAG & DROP
================================================================ */
let drag=null;
const ghost=document.getElementById('ghost');

function ghostAt(x,y){ ghost.style.left=x+'px'; ghost.style.top=y+'px'; }

function startDrag(pid,name,x,y){
  drag={pid,name};
  ghost.textContent=name;
  ghost.style.display='block';
  ghostAt(x,y);
  document.querySelector(`.pl-item[data-pid="${pid}"]`)?.classList.add('dragging');
}
function moveDrag(x,y){
  if(!drag) return;
  ghostAt(x,y);
  ghost.style.visibility='hidden';
  const el=document.elementFromPoint(x,y);
  ghost.style.visibility='visible';
  document.querySelectorAll('.dov').forEach(e=>e.classList.remove('dov'));
  if(el){
    const pd=el.closest('[data-a="cpos"]'), ba=el.closest('[data-a="bdrop"]');
    if(pd) pd.classList.add('dov');
    else if(ba) ba.classList.add('dov');
  }
}
async function endDrag(x,y){
  if(!drag) return;
  ghost.style.display='none';
  document.querySelectorAll('.dov').forEach(e=>e.classList.remove('dov'));
  document.querySelector(`.pl-item[data-pid="${drag.pid}"]`)?.classList.remove('dragging');
  ghost.style.visibility='hidden';
  const el=document.elementFromPoint(x,y);
  ghost.style.visibility='visible';
  if(el){
    const pd=el.closest('[data-a="cpos"]');
    const ba=el.closest('[data-a="bdrop"]');
    if(pd){ await setPos(+pd.dataset.mi, pd.dataset.q, pd.dataset.pos, drag.pid); renderContent(); }
    else if(ba){ await addBench(+ba.dataset.mi, drag.pid); renderContent(); }
  }
  drag=null;
}

/* Touch */
document.addEventListener('touchstart',e=>{
  if(!S.isMgr) return;
  const it=e.target.closest('.pl-item');
  if(!it||e.target.closest('.pl-cb')) return;
  const t=e.touches[0];
  startDrag(it.dataset.pid,it.dataset.name,t.clientX,t.clientY);
  e.preventDefault();
},{passive:false});
document.addEventListener('touchmove',e=>{
  if(!drag) return;
  const t=e.touches[0]; moveDrag(t.clientX,t.clientY); e.preventDefault();
},{passive:false});
document.addEventListener('touchend',e=>{
  if(!drag) return;
  const t=e.changedTouches[0]; endDrag(t.clientX,t.clientY); e.preventDefault();
},{passive:false});

/* Mouse */
let mdown=false;
document.addEventListener('mousedown',e=>{
  if(!S.isMgr) return;
  const it=e.target.closest('.pl-item');
  if(!it||e.target.closest('.pl-cb')) return;
  mdown=true; startDrag(it.dataset.pid,it.dataset.name,e.clientX,e.clientY); e.preventDefault();
});
document.addEventListener('mousemove',e=>{ if(mdown&&drag) moveDrag(e.clientX,e.clientY); });
document.addEventListener('mouseup',  e=>{ if(mdown&&drag){ mdown=false; endDrag(e.clientX,e.clientY); } });

/* ================================================================
   EVENT DELEGATION
================================================================ */
document.addEventListener('click', async e=>{
  const t=e.target;
  /* --- LOGIN --- */
  const tb=t.closest('.team-btn');
  if(tb){ document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('sel')); tb.classList.add('sel'); S.team=tb.dataset.team; goStep(2); return; }
  const rb=t.closest('.role-btn');
  if(rb&&!rb.closest('.mbg')){ document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('sel')); rb.classList.add('sel'); S.group=rb.dataset.group; S.role=rb.dataset.role; S.key=`${S.team}_${S.group}`; goStep(3); return; }
  if(t.id==='ls2-back'){ goStep(1); return; }
  if(t.id==='ls3-back'){ goStep(2); return; }
  if(t.id==='ls3-ok'){ await doLogin(); return; }

  /* --- SIDEBAR TOOLS --- */
  const a=t.closest('[data-a]')?.dataset?.a;
  if(a==='roster'){ openM('m-roster'); renderRoster(); return; }
  if(a==='rpos')  { doResetPos(); return; }  // Note: typo fix - was resetPos, correct name used here

  /* --- MATCH CARD --- */
  if(a==='cpq'){ const mi=+t.closest('[data-a]').dataset.mi; await copyQ1toQ2(mi); renderContent(); return; }
  if(a==='cpos'){
    if(!S.isMgr) return;
    const el=t.closest('[data-a]');
    openPosModal(+el.dataset.mi, el.dataset.q, el.dataset.pos, el.dataset.pid||null);
    return;
  }
  if(a==='rmb'){
    if(!S.isMgr) return;
    const el=t.closest('[data-a]');
    await rmBench(+el.dataset.mi, +el.dataset.bi);
    renderContent(); return;
  }

  /* --- HEADER --- */
  if(t.id==='btn-addmon'){
    const d=new Date(); d.setMonth(d.getMonth()+1);
    document.getElementById('new-mon').value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    openM('m-addmon'); return;
  }
  if(t.id==='btn-stats'){
    S.statsOpen=!S.statsOpen;
    const se=document.getElementById('stats');
    if(S.statsOpen){ se.style.display='flex'; renderStats(); } else se.style.display='none'; return;
  }
  if(t.id==='btn-menu'){ if(S.isMgr) openM('m-menu'); return; }
  if(t.id==='btn-out'){
    if(confirm('ログアウトしますか？')){ fbOff(); sessionStorage.removeItem('_s'); resetAppState(); showLogin(); }
    return;
  }

  /* --- MENU MODAL --- */
  if(t.id==='mm-roster'){ closeM('m-menu'); openM('m-roster'); renderRoster(); return; }
  if(t.id==='mm-rpos')  { closeM('m-menu'); await resetPos(); return; }
  if(t.id==='mm-rall')  { closeM('m-menu'); await resetAll(); return; }
  if(t.id==='mm-pw')    { closeM('m-menu'); document.getElementById('pw-v').value=''; document.getElementById('pw-m').value=''; openM('m-pw'); return; }
  if(t.id==='mm-close') { closeM('m-menu'); return; }

  /* --- POS MODAL --- */
  if(t.id==='m-pos-clear')  { await doPosModalClear(); return; }
  if(t.id==='m-pos-cancel') { closeM('m-pos'); return; }
  const mplb=t.closest('.mpl-btn');
  if(mplb&&!mplb.classList.contains('placed')){ await doPosModalSel(mplb.dataset.pid); return; }

  /* --- ROSTER MODAL --- */
  if(t.id==='btn-addpl'){
    const n=document.getElementById('new-name').value.trim();
    if(n){ await addPlayer(n); document.getElementById('new-name').value=''; renderRoster(); }
    return;
  }
  if(t.id==='btn-croster'){ closeM('m-roster'); return; }
  const delb=t.closest('[data-a="delp"]');
  if(delb){ const pid=delb.dataset.pid; if(confirm(`「${S.roster[pid]?.name}」を削除しますか？`)){ await delPlayer(pid); renderRoster(); } return; }

  /* --- PW MODAL --- */
  if(t.id==='btn-savepw'){ await changePw(document.getElementById('pw-v').value, document.getElementById('pw-m').value); closeM('m-pw'); return; }
  if(t.id==='btn-canpw') { closeM('m-pw'); return; }

  /* --- ADD MONTH MODAL --- */
  if(t.id==='btn-confmon'){ const ym=document.getElementById('new-mon').value; if(!ym){alert('年月を選択してください');return;} await doAddMonth(ym); closeM('m-addmon'); return; }
  if(t.id==='btn-canmon') { closeM('m-addmon'); return; }

  /* --- MODAL BACKDROP --- */
  if(t.classList.contains('mbg')){ t.classList.remove('open'); return; }
});

document.addEventListener('change', async e=>{
  const t=e.target;

  if(t.classList.contains('pl-cb')){
    if(!S.isMgr) return;
    await setAttend(t.dataset.pid, t.checked);
    renderRoster();
    return;
  }

  if(t.classList.contains('roster-cb')){
    if(!S.isMgr) return;
    await setAttend(t.dataset.pid, t.checked);
    renderSB();
    renderContent();
    renderRoster();
    return;
  }

  if(t.dataset.a==='form'){ await setForm(+t.dataset.mi, t.dataset.q, t.value); renderContent(); return; }

  if(t.id==='mon-sel'){
    if(t.value===S.month) return;
    S.month=t.value;
    showLoad(true);
    fbOff();
    await loadMonth();
    showLoad(false);
    renderSB(); renderContent();
    if(S.statsOpen) renderStats();
    startListeners();
  }
});

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(S.step===3){ document.getElementById('ls3-ok').click(); return; }
    if(document.activeElement?.id==='new-name') document.getElementById('btn-addpl').click();
  }
});

/* ================================================================
   MODALS
================================================================ */
const openM  = id => document.getElementById(id).classList.add('open');
const closeM = id => document.getElementById(id).classList.remove('open');

let _pctx=null;
function openPosModal(mi,q,posId,curPid){
  _pctx={mi,q,posId};
  const m=S.matches[mi];
  const form=m?.[q]?.formation||DEF_FORM;
  const fdef=FORMS[form]||FORMS[DEF_FORM];
  const pd=fdef.find(p=>p.id===posId);
  document.getElementById('m-pos-ttl').textContent=`${pd?.lb||posId} のポジション`;
  const occ=new Set(Object.values(m?.[q]?.positions||{}).filter(Boolean));
  const pls=sortedPlayers();
  document.getElementById('m-pos-list').innerHTML=pls.map(p=>{
    const placed=occ.has(p.id)&&p.id!==curPid;
    return `<button class="mpl-btn ${p.present?'present-mark':''} ${placed?'placed':''}" data-pid="${p.id}" ${placed?'disabled':''}>
      ${esc(p.name)}${p.present?' ✓':''}${placed?' (配置済み)':''}
    </button>`;
  }).join('');
  openM('m-pos');
}
async function doPosModalSel(pid){ if(!_pctx) return; await setPos(_pctx.mi,_pctx.q,_pctx.posId,pid); closeM('m-pos'); renderContent(); }
async function doPosModalClear(){ if(!_pctx) return; await setPos(_pctx.mi,_pctx.q,_pctx.posId,null); closeM('m-pos'); renderContent(); }

function renderRoster(){
  const pls = Object.entries(S.roster);
  document.getElementById('roster-list').innerHTML = !pls.length
    ? '<div style="padding:12px;text-align:center;color:#444;font-size:12px">選手が登録されていません</div>'
    : pls.map(([id,d])=>{
        const present = !!S.attend[id];
        return `<div class="roster-row ${present?'present':''}">
          ${S.isMgr?`<span class="roster-att">
              <input type="checkbox" class="roster-cb" data-pid="${id}" ${present?'checked':''}>
              <span style="font-size:11px;color:#777">出席</span>
            </span>`:''}
          <span style="flex:1;font-size:13px">${esc(d.name)}</span>
          <button class="roster-del" data-a="delp" data-pid="${id}">削除</button>
        </div>`;
      }).join('');
}


/* resetPos / resetAll are defined above */
async function doResetPos() { await resetPos(); }

/* ================================================================
   LOGIN
================================================================ */
function goStep(n){
  S.step=n;
  document.getElementById('ls1').style.display=n===1?'block':'none';
  document.getElementById('ls2').style.display=n===2?'block':'none';
  document.getElementById('ls3').style.display=n===3?'block':'none';
  if(n===3){
    const t=TEAMS[S.team], g=GROUPS[S.group], r=S.role==='manager'?'監督用':'閲覧用';
    document.getElementById('ls3-lbl').textContent=`${t.e}${t.n} ${g}（${r}）のパスワード`;
    document.getElementById('ls3-pw').value='';
    document.getElementById('ls3-err').textContent='';
    setTimeout(()=>document.getElementById('ls3-pw').focus(),50);
  }
}

async function doLogin(){
  const pw=document.getElementById('ls3-pw').value;
  const btn=document.getElementById('ls3-ok');
  btn.disabled=true; btn.textContent='確認中...';
  const ok=await checkPw(S.key, S.role, pw);
  btn.disabled=false; btn.textContent='ログイン';
  if(!ok){ document.getElementById('ls3-err').textContent='❌ パスワードが違います'; return; }
  S.isMgr=S.role==='manager';
  sessionStorage.setItem('_s',JSON.stringify({team:S.team,group:S.group,role:S.role,key:S.key}));
  document.getElementById('login').style.display='none';
  showLoad(true);
  await ensurePw();
  await loadMonths();
  S.month=YM();
  if(!S.months.includes(S.month)){ S.months.push(S.month); S.months.sort(); }
  await loadMonth();
  showLoad(false);
  launchApp();
}

/* ================================================================
   APP LAUNCH
================================================================ */
function launchApp(){
  document.getElementById('app').style.display='flex';
  document.getElementById('h-team').textContent=tLabel();
  const badge=document.getElementById('h-badge');
  badge.textContent=S.isMgr?'監督':'閲覧';
  badge.className='h-badge '+(S.isMgr?'mgr':'view');
  document.getElementById('btn-addmon').style.display=S.isMgr?'':'none';
  document.getElementById('btn-menu').style.display=S.isMgr?'':'none';
  renderMonSel(); renderSB(); renderContent(); startListeners();
}

function showLogin(){
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  goStep(1);
  document.querySelectorAll('.team-btn,.role-btn').forEach(b=>b.classList.remove('sel'));
}

function resetAppState(){
  S.team=null; S.group=null; S.role=null; S.key=null; S.isMgr=false;
  S.month=null; S.months=[]; S.roster={}; S.attend={}; S.matches=[];
  S.statsOpen=false; S.step=1;
  document.getElementById('stats').style.display='none';
}

/* ================================================================
   LOADING
================================================================ */
function showLoad(v){ document.getElementById('loading').style.display=v?'flex':'none'; }

/* ================================================================
   BOOTSTRAP
================================================================ */
async function boot(){
  if('serviceWorker' in navigator)
    navigator.serviceWorker.register('./sw.js').catch(()=>{});

  initFB();

  // Session restore
  const saved=sessionStorage.getItem('_s');
  if(saved){
    try{
      const sess=JSON.parse(saved);
      S.team=sess.team; S.group=sess.group; S.role=sess.role; S.key=sess.key;
      S.isMgr=sess.role==='manager';
      await loadMonths();
      S.month=YM();
      if(!S.months.includes(S.month)){ S.months.push(S.month); S.months.sort(); }
      await loadMonth();
      showLoad(false);
      launchApp();
      return;
    }catch(e){ sessionStorage.removeItem('_s'); }
  }

  showLoad(false);
  showLogin();
}

boot();
</script>
